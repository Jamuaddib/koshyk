<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кошик тижня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg: var(--tg-theme-bg-color, #FAF6EE);
  --card: var(--tg-theme-secondary-bg-color, #FFFFFF);
  --ink: var(--tg-theme-text-color, #1F2419);
  --muted: var(--tg-theme-hint-color, #77806E);
  --accent:#3E7C4A; --accent-soft:#E4EFE0; --accent-ink:#fff;
  --beet:#A63A50; --mustard:#D9A03F;
  --line: color-mix(in srgb, var(--ink) 10%, transparent);
  --shadow: 0 2px 10px color-mix(in srgb, var(--ink) 7%, transparent);
  --r:18px;
  --fd:'Unbounded','Manrope',system-ui,sans-serif;
  --fb:'Manrope',system-ui,-apple-system,sans-serif;
  --t1:#EEF4E4;--t2:#F7EBDD;--t3:#ECE9F5;--t4:#E3EFF2;--t5:#F6E6E9;--t6:#F2EFDF;--t7:#E6F1EA;
}
[data-scheme="dark"]{
  --accent:#6FBA7B; --accent-soft:#243522; --beet:#E27E92; --mustard:#E0B45C;
  --t1:#2A3324;--t2:#38302A;--t3:#2E2B3A;--t4:#263437;--t5:#3A2B30;--t6:#33301F;--t7:#26332B;
  --shadow: 0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--fb);font-size:16px;line-height:1.45;overscroll-behavior:none}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}
button:active{transform:scale(.97)}
input[type=text]{width:100%;padding:12px 14px;border-radius:13px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-size:15px;font-weight:700}
#app{max-width:560px;margin:0 auto;padding:10px 16px 132px}
.view{animation:fade .2s ease}
.view.sl{animation:slideL .24s ease}
.view.sr{animation:slideR .24s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideL{from{opacity:.4;transform:translateX(26px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:.4;transform:translateX(-26px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* плавні повзунки */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:36px;background:transparent;margin:2px 0}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:99px;background:var(--line)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent);margin-top:-10px;box-shadow:0 1px 4px rgba(0,0,0,.3);border:3px solid var(--card)}
input[type=range]::-moz-range-track{height:6px;border-radius:99px;background:var(--line)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);border:3px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.3)}

.hdr{display:flex;align-items:center;gap:10px;padding:6px 0 12px}
.hdr .back{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-size:17px;flex:none;display:grid;place-items:center}
.hdr .ttl{font-family:var(--fd);font-weight:700;font-size:19px;letter-spacing:-.02em}
.hdr .sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:1px}
.hdr .gear{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-size:17px;display:grid;place-items:center}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.hint{color:var(--muted);font-size:13px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:16px;background:var(--accent);color:var(--accent-ink);font-weight:800;font-size:16px}
.btn.ghost{background:transparent;border:1.5px dashed var(--line);color:var(--muted);font-weight:700;padding:13px}
.btn.soft{background:var(--accent-soft);color:var(--accent)}
.txtbtn{display:block;margin:14px auto 0;color:var(--muted);font-weight:700;font-size:13.5px;text-decoration:underline;text-underline-offset:3px}
.rowchips{display:flex;gap:8px;margin:0 0 12px;flex-wrap:wrap}
.fbtn{display:flex;align-items:center;gap:6px;padding:9px 13px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-weight:800;font-size:12.5px;color:var(--muted)}
.fbtn b{color:var(--beet)}

/* onboarding */
.ob{padding-top:4vh;animation:rise .3s ease}
.dots{display:flex;gap:6px;margin-bottom:22px}
.dots i{width:16px;height:5px;border-radius:99px;background:var(--line)}
.dots i.on{background:var(--accent)}
.ob h1{font-family:var(--fd);font-weight:700;font-size:23px;line-height:1.22;margin:0 0 6px}
.ob .sub{color:var(--muted);font-size:14.5px;margin:0 0 20px}
.hero{text-align:center;padding-top:6vh}
.hero .big{font-size:70px;line-height:1;margin-bottom:16px;animation:rise .5s ease}
.hero h1{font-size:25px}
.steps3{display:flex;flex-direction:column;gap:10px;margin:24px 0 28px;text-align:left}
.steps3 .s{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-weight:700;font-size:14.5px}
.steps3 .s em{font-style:normal;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:17px;flex:none}
.person{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;margin-bottom:10px}
.person .l{display:flex;align-items:center;gap:12px;font-weight:800;font-size:16px}
.person .l span{font-size:25px}
.step2{display:flex;align-items:center;gap:14px}
.step2 button{width:44px;height:44px;border-radius:13px;background:var(--accent-soft);color:var(--accent);font-size:22px;font-weight:800}
.step2 .v{min-width:26px;text-align:center;font-family:var(--fd);font-weight:700;font-size:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.tgl{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;font-weight:700;font-size:13px;position:relative}
.tgl span{display:block;font-size:24px;margin-bottom:4px}
.tgl.on{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--card))}
.tgl.on::after{content:'✓';position:absolute;top:6px;right:9px;font-size:12px;font-weight:800}
.tgl.ex.on{border-color:var(--beet);color:var(--beet);background:color-mix(in srgb,var(--beet) 7%,var(--card))}
.tgl.ex.on::after{content:'✕'}
.slider-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:10px}
.slider-card .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;font-weight:700}
.slider-card .bigv{font-family:var(--fd);font-weight:700;font-size:20px}

/* day plan */
.dayh{display:flex;justify-content:space-between;align-items:baseline;margin:18px 2px 8px}
.dayh .d{font-family:var(--fd);font-weight:700;font-size:15px}
.dayh .m{font-size:11.5px;color:var(--muted);font-weight:700}
.slotrow{display:flex;gap:10px;align-items:stretch;margin-bottom:8px}
.mtag{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;justify-content:center;width:18px;flex:none}
.dcw{flex:1;position:relative;overflow:hidden;border-radius:var(--r)}
.dc{display:flex;gap:11px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:9px;box-shadow:var(--shadow);position:relative;touch-action:pan-y;transition:transform .18s ease}
.dc.drag{transition:none}
.dc.out{transition:transform .22s ease,opacity .22s;opacity:0}
.ph{width:56px;height:56px;border-radius:13px;flex:none;position:relative;overflow:hidden;display:grid;place-items:center}
.ph img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.ph .em{font-size:27px;position:relative;z-index:1;display:none}
.ph.noimg img{display:none}
.ph.noimg .em{display:block}
.dc .mid{flex:1;min-width:0}
.dc .nm{font-weight:800;font-size:14.5px;line-height:1.25}
.dc .mt{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.dc .mt b{color:var(--beet);font-weight:800}
.badge{background:var(--accent-soft);color:var(--accent);font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px}
.dc .chev{color:var(--muted);font-size:19px;flex:none;padding:0 2px}
.dc.cont{opacity:.78}
.swipehint{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:16px;color:var(--accent);font-weight:800;font-size:13px;background:var(--accent-soft);border-radius:var(--r);z-index:-1}
.skel{height:76px;border-radius:var(--r);margin-bottom:8px;background:linear-gradient(100deg,var(--card) 40%,color-mix(in srgb,var(--ink) 6%,var(--card)) 50%,var(--card) 60%);background-size:200% 100%;animation:shim 1s linear infinite}
@keyframes shim{to{background-position:-200% 0}}

/* dish full view */
.dish-hero{height:210px;border-radius:20px;position:relative;overflow:hidden;display:grid;place-items:center;box-shadow:var(--shadow);margin-bottom:14px}
.dish-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.dish-hero .em{font-size:84px;display:none}
.dish-hero.noimg img{display:none}
.dish-hero.noimg .em{display:block}
.dish-nm{font-family:var(--fd);font-weight:700;font-size:21px;line-height:1.25;margin:0 0 8px}
.meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.mc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 11px;font-size:12.5px;font-weight:800;color:var(--muted)}
.mc b{color:var(--ink)}
.sh-sub{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.sh-ing{margin:0;padding:0;list-style:none}
.sh-ing li{display:flex;justify-content:space-between;gap:10px;padding:8px 2px;border-bottom:1px dashed var(--line);font-size:14px}
.sh-ing li b{color:var(--muted);font-weight:700;font-size:13px;white-space:nowrap}
.sh-ing li .alt{color:var(--muted);font-size:12px;font-weight:600}
.stepslist{margin:0;padding:0 0 0 2px;list-style:none;counter-reset:st}
.stepslist li{display:flex;gap:11px;padding:9px 0;font-size:14.5px;line-height:1.5;border-bottom:1px dashed var(--line)}
.stepslist li:last-child{border-bottom:none}
.stepslist li::before{counter-increment:st;content:counter(st);width:24px;height:24px;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:12.5px;display:grid;place-items:center;flex:none;margin-top:2px}
.sh-act{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}

/* кошик (єдиний екран замовлення) */
.sum{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.sum .l1{display:flex;justify-content:space-between;align-items:baseline}
.sum .tot{font-family:var(--fd);font-weight:700;font-size:21px}
.sum .tot.over{color:var(--beet)}
.sum .bd{font-size:12.5px;color:var(--muted);font-weight:700}
.bar{height:7px;border-radius:99px;background:var(--line);margin:9px 0 7px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.bar i.over{background:var(--beet)}
.sum .l2{font-size:12.5px;color:var(--muted);font-weight:600}
.srcchip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:800;border-radius:99px;padding:4px 10px;margin-bottom:10px}
.srcchip.warn{background:color-mix(in srgb,var(--mustard) 16%,transparent);color:var(--mustard)}
.storebar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 14px;margin-bottom:12px;font-weight:800;font-size:14px}
.storebar .go{color:var(--accent);font-weight:800}
.fieldlbl{font-weight:800;font-size:13px;color:var(--muted);margin:14px 2px 7px}
.sel{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--card);font-size:15px;font-weight:700;font-family:inherit;color:inherit}
.storelist{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.storeopt{display:flex;align-items:center;gap:12px;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;width:100%;transition:border-color .12s}
.storeopt.on{border-color:var(--accent);background:var(--accent-soft)}
.storeopt .so-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.storeopt .so-main b{font-size:14.5px}
.storeopt .so-main span{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.storeopt .so-ck{width:24px;height:24px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800;flex:none;opacity:0;font-size:13px}
.storeopt.on .so-ck{opacity:1}
.prog .pt{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:6px}
.prog .pt b{color:var(--accent)}
.cath{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 2px 8px}
.bi{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px 12px;margin-bottom:8px;cursor:pointer}
.ck{width:28px;height:28px;border-radius:10px;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;font-size:15px;font-weight:800;transition:all .15s}
.bi.done .ck{background:var(--accent);border-color:var(--accent)}
.bi.done .nm{text-decoration:line-through;color:var(--muted)}
.bi .nm{font-weight:700;font-size:14.5px;line-height:1.25}
.bi .prod{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:210px}
.bi .left{font-size:11.5px;color:var(--mustard);font-weight:700;margin-top:2px}
.bi .qc{display:flex;align-items:center;gap:9px;margin-top:6px}
.bi .qc button{width:30px;height:30px;border-radius:9px;background:var(--bg);border:1px solid var(--line);font-size:16px;font-weight:800;color:var(--muted)}
.bi .qc b{font-size:13px;min-width:64px;text-align:center}
.bi .rc{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:none}
.bi .pr{font-weight:800;font-size:14px;color:var(--beet);font-variant-numeric:tabular-nums;white-space:nowrap}
.bi .ic{width:32px;height:32px;border-radius:10px;background:var(--bg);border:1px solid var(--line);font-size:14px;display:grid;place-items:center;color:var(--muted)}
.bi .ic.find{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.homegrp{margin-top:18px}
.homegrp .hh{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-weight:800;font-size:13px;padding:4px 2px;cursor:pointer}
.bi.home-item{opacity:.55}
.bi.home-item .nm{text-decoration:line-through}
.donebox{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px 16px;margin-bottom:12px;box-shadow:var(--shadow);animation:rise .35s ease}
.donebox .e{font-size:50px;margin-bottom:8px}
.donebox .t{font-family:var(--fd);font-weight:700;font-size:19px;margin-bottom:4px}

#bar{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:560px;margin:0 auto;background:var(--card);border-top:2px dashed var(--line);padding:11px 16px calc(13px + env(safe-area-inset-bottom));box-shadow:0 -8px 26px color-mix(in srgb,var(--ink) 9%,transparent)}
#bar .info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;font-variant-numeric:tabular-nums}
#bar .tt{font-family:var(--fd);font-weight:700;font-size:17px}
#bar .tt.over{color:var(--beet)}
#bar .bb{font-size:12px;color:var(--muted);font-weight:700}
#bar .btn{padding:14px}

#ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s}
#ovl.show{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:560px;margin:0 auto;background:var(--card);border-radius:22px 22px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .26s cubic-bezier(.3,.9,.3,1);max-height:84vh;overflow:auto}
#sheet.show{transform:none}
#sheet .grab{width:42px;height:4px;border-radius:99px;background:var(--line);margin:4px auto 14px}
.sh-title{font-family:var(--fd);font-weight:700;font-size:16px;margin:2px 0 12px}
.mini{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px dashed var(--line);font-weight:700;font-size:14px}
.mini:last-child{border-bottom:none}
.mini .q{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
.sw{width:46px;height:27px;border-radius:99px;background:var(--line);position:relative;flex:none;transition:background .18s}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on{background:var(--accent)}
.sw.on::after{left:22px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}
.chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.chip.ex.on{border-color:var(--beet);color:var(--beet);background:transparent}
.altb{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:8px;width:100%;text-align:left}
.altb .ph{width:50px;height:50px;border-radius:12px}
.altb .n{flex:1;font-weight:700;font-size:14.5px}
.altb .p{font-size:12.5px;color:var(--beet);font-weight:800}
.set-row{margin-bottom:14px}
.set-row .lbl{font-weight:800;font-size:13.5px;margin-bottom:8px;color:var(--muted)}
.profchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.empty{color:var(--muted);text-align:center;padding:40px 12px;font-size:14.5px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:118px;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:12px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;max-width:86%;text-align:center}
.toast.show{opacity:1}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div id="app"></div>
<div id="bar" style="display:none"></div>
<div id="ovl" onclick="UI.closeSheet()"></div>
<div id="sheet"></div>
<div class="toast" id="toast"></div>

<script src="data.js?v=1"></script>
<script>
/* =================================================================
   КОШИК ТИЖНЯ v5
   Обіди = супи · дитячий фільтр · один екран замовлення з магазином
   каталогу · свайпи між екранами · плавні повзунки без ререндерів
   ================================================================= */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) { try { tg.ready(); tg.expand(); } catch(e){}
  try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e){} }
function applyScheme(){ document.documentElement.dataset.scheme=(tg&&tg.colorScheme)==='dark'?'dark':'light'; }
applyScheme(); if (tg) tg.onEvent('themeChanged', applyScheme);
function hap(t){ try{ if(!tg||!tg.HapticFeedback) return;
  t==='ok'?tg.HapticFeedback.notificationOccurred('success'):tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }

/* ІНГРЕДІЄНТИ (ING) та СТРАВИ (RECIPES) генеруються з recipe-vault — див. data.js.
   Правити тут нічого не треба: python recipe-vault/export/build_catalog.py */
const CATS={veg:"🥬 Овочі та фрукти",meat:"🍖 М\u2019ясо та риба",dairy:"🥛 Молочне та яйця",groc:"🌾 Бакалія",sauce:"🥫 Соуси та консерви",bread:"🍞 Хліб"};
const PANTRY_DEFAULT=['oliia','sil','tsukor','spetsii'];

const MEALS=[
 ['breakfast','Сніданок','🍳',.25],
 ['lunch','Обід','🍲',.35],
 ['dinner','Вечеря','🍽️',.30],
 ['snack','Перекус','🥪',.10]
];
const MEAL_N=Object.fromEntries(MEALS.map(m=>[m[0],m[1]]));
const EXCL=[
 ['pork','🥓','Свинина'],['beef','🥩','Яловичина'],['chicken','🍗','Курка'],
 ['fish','🐟','Риба'],['mushrooms','🍄','Гриби'],['dairy','🥛','Молочне'],
 ['eggs','🥚','Яйця'],['gluten','🌾','Глютен'],['spicy','🌶️','Гостре']
];

const DAYS_UA=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
const TILES=['t1','t2','t3','t4','t5','t6','t7'];
const IMGDIR='img/';
const STAPLE_GROUPS=[
 {t:'🥛 Молочне щотижня',items:[['moloko',1],['yogurt',0]]},
 {t:'🍞 Хліб і випічка',items:[['khlib',1],['lavash',0]]},
 {t:'🍎 Фрукти',items:[['yabluka',1],['banany',1]]},
 {t:'☕ Напої',items:[['chai',1]]}
];

/* ---------- СТАН ---------- */
function newProfile(nm){return {nm:nm||'Мій профіль',a:1,k:0,allerg:[],meals:{breakfast:true,lunch:true,dinner:true,snack:false},kcalOn:false,kcal:2000,budget:2500};}
let S={
  onboarded:false,wz:0,view:'menu',navDir:0,dishRef:null,
  city:'odesa',storeId:'482211449',
  profiles:[newProfile()],pid:0,
  week:{days:7,dislikes:[],plan:[],locked:{},over:{},checked:{},homeOpen:true},
  staples:Object.fromEntries(STAPLE_GROUPS.flatMap(g=>g.items)),
  pantry:[...PANTRY_DEFAULT],
  ui:{scroll:{}}
};
let CAT=null,CATRAW=null;
/* CAT активний лише коли завантажений catalog.json стосується ОБРАНОГО магазину —
   інакше показуємо орієнтовні ціни, а не чужі. Один каталог = один магазин. */
function syncCat(){CAT=(CATRAW&&String((CATRAW.store||{}).id||'')===String(S.storeId))?CATRAW:null;}
/* ---- Клієнт до нашого проксі zakaz (той самий origin, що й застосунок) ----
   Логін телефон+пароль (вхід по SMS закритий reCAPTCHA). Пароль летить напряму
   в zakaz через проксі, ми зберігаємо лише sid сесії в пам'яті вкладки. */
let SID=null,ORDER_READY=false;
async function zpost(path,body){
 const h={'Content-Type':'application/json'};if(SID)h['X-Foody-Sid']=SID;
 const r=await fetch(path,{method:'POST',headers:h,body:JSON.stringify(body||{})});
 let d={};try{d=await r.json();}catch(_){}
 return {ok:r.ok,status:r.status,d};}
function zErr(d){return (d&&d.errors&&d.errors[0]&&(d.errors[0].description||d.errors[0].message))||'Не вдалося. Спробуй ще раз.';}
const mem={};
const cloudOK=!!(tg&&tg.CloudStorage&&tg.isVersionAtLeast&&tg.isVersionAtLeast('6.9'));
function cget(k){return new Promise(r=>{if(!cloudOK)return r(mem[k]||null);
 try{tg.CloudStorage.getItem(k,(e,v)=>r(e?null:(v||null)));}catch(_){r(mem[k]||null);}});}
function cset(k,v){return new Promise(r=>{mem[k]=v;if(!cloudOK)return r(true);
 try{tg.CloudStorage.setItem(k,v,()=>r(true));}catch(_){r(true);}});}
function save(){cset('kt_state_v5',JSON.stringify({onboarded:S.onboarded,city:S.city,storeId:S.storeId,profiles:S.profiles,pid:S.pid,week:S.week,staples:S.staples,pantry:S.pantry}));}
async function load(){const raw=await cget('kt_state_v5');if(!raw)return;
 try{const d=JSON.parse(raw);S={...S,...d,ui:S.ui};if(!S.profiles||!S.profiles.length)S.profiles=[newProfile()];
  S.pid=Math.min(S.pid||0,S.profiles.length-1);}catch(_){}}

/* ---------- ХЕЛПЕРИ ---------- */
const P=()=>S.profiles[S.pid];
const rid2r=Object.fromEntries(RECIPES.map(r=>[r.id,r]));
const portions=()=>Math.max(1,P().a+P().k*0.6);
const scale=()=>portions()/4;
/* yieldOf(r) — скільки порцій дає готова страва (базові к-сті на 4 порції);
   mealsCovered — на скільки прийомів їжі цієї сім'ї її вистачить (округляємо вниз). */
const yieldOf=r=>r.y||(r.days===2?8:4);
const mealsCovered=r=>Math.max(1,Math.floor(yieldOf(r)/portions()));
const fmt=n=>'₴'+Math.round(n).toLocaleString('uk-UA');
const excluded=()=>[...P().allerg,...S.week.dislikes];
const okKid=r=>P().k===0||r.kid!==false;
const allowed=r=>!r.tags.some(t=>excluded().includes(t))&&okKid(r);
const enabledMeals=()=>MEALS.filter(m=>P().meals[m[0]]);
function slotFactor(r){return scale()*(r.days===2?2:1);}
function unitPrice(id){if(CAT&&CAT.map[id]){const c=CAT.map[id];return c.price/Math.max(c.packQty||1,.001);}
 return ING[id][2];}
function dishCost(r,f){const ff=f!=null?f:scale();
 return r.ing.reduce((s,ing)=>{const [id,q,o]=ing;if(o&&o.opt)return s;return s+q*ff*unitPrice(id);},0);}

/* пакування + залишок */
function packUp(id,need){
 const [,unit,estPrice,,estPack,estLabel]=ING[id];
 let price,pk,label,loose;
 if(CAT&&CAT.map[id]){const c=CAT.map[id];
   loose=!!c.loose;pk=c.packQty||1;price=c.price;label=c.packLabel||estLabel||unit;}
 else{loose=estPack==null;pk=estPack||1;price=(estPack||1)*estPrice;label=estLabel||('1 '+unit);}
 if(loose){const q=Math.max(.1,Math.round(need*10)/10);
   return {qty:q,packs:null,label:(+q.toFixed(1)).toLocaleString('uk-UA')+' '+unit,price:q*(price/pk),left:0};}
 const packs=Math.max(1,Math.ceil(need/pk-1e-9));
 const qty=packs*pk,left=qty-need;
 return {qty,packs,label:packs+' × '+label,price:packs*price,left};}
function fmtLeft(id,left){const u=ING[id][1];
 if(u==='кг')return left>=.05?`залишиться ≈ ${Math.round(left*1000)} г`:'';
 if(u==='л')return left>=.1?`залишиться ≈ ${(+left.toFixed(1))} л`:'';
 return left>=1?`залишиться ${Math.round(left)} ${u}`:'';}

/* ---------- ГЕНЕРАЦІЯ ---------- */
function mealShare(meal){const en=enabledMeals();const sum=en.reduce((s,m)=>s+m[3],0);
 const m=MEALS.find(x=>x[0]===meal);return m[3]/(sum||1);}
function poolFor(meal,usedToday,prevRid){
 let pool=RECIPES.filter(r=>r.meal.includes(meal)&&allowed(r)&&!usedToday.includes(r.id)&&r.id!==prevRid);
 if(P().kcalOn){const target=P().kcal*mealShare(meal);
   const band=pool.filter(r=>r.k>=target*.55&&r.k<=target*1.6);
   if(band.length>=2)pool=band;}
 return pool.length?pool:RECIPES.filter(r=>r.meal.includes(meal)&&allowed(r));}
function generateWeek(){
 const days=S.week.days,plan=[];const oldPlan=S.week.plan||[];
 for(let i=0;i<days;i++)plan.push({slots:{}});
 for(const [meal] of enabledMeals()){
   let prev=null;
   for(let i=0;i<days;i++){
     if(plan[i].slots[meal])continue;
     const key=i+':'+meal;
     const lockedRid=S.week.locked[key]&&oldPlan[i]&&oldPlan[i].slots[meal]&&!oldPlan[i].slots[meal].cont
       ?oldPlan[i].slots[meal].rid:null;
     let r=lockedRid&&rid2r[lockedRid]&&allowed(rid2r[lockedRid])?rid2r[lockedRid]:null;
     if(!r){const usedToday=Object.values(plan[i].slots).map(s=>s.rid);
       const pool=poolFor(meal,usedToday,prev);
       r=pool[Math.floor(Math.random()*pool.length)];}
     if(!r)continue;
     plan[i].slots[meal]={rid:r.id};
     if(r.days===2&&i+1<days&&!plan[i+1].slots[meal])plan[i+1].slots[meal]={rid:r.id,cont:true};
     prev=r.id;}}
 S.week.plan=plan;
 budgetPass();
 S.week.over={};S.week.checked={};save();}
function budgetPass(){
 for(let pass=0;pass<12;pass++){
   if(total()<=P().budget*1.05)break;
   let worst=null,worstCost=0;
   S.week.plan.forEach((d,i)=>{for(const meal in d.slots){const s=d.slots[meal];
     if(s.cont||S.week.locked[i+':'+meal])continue;const r=rid2r[s.rid];
     const c=dishCost(r,slotFactor(r));if(c>worstCost){worstCost=c;worst={i,meal};}}});
   if(!worst)break;
   const usedToday=Object.values(S.week.plan[worst.i].slots).map(s=>s.rid);
   const alt=RECIPES.filter(r=>r.meal.includes(worst.meal)&&allowed(r)&&!usedToday.includes(r.id)&&!r.days
     &&dishCost(r,scale())<worstCost*.75).sort((a,b)=>dishCost(a,scale())-dishCost(b,scale()))[0];
   if(!alt)break;
   replaceSlot(worst.i,worst.meal,alt.id,true);}}
function replaceSlot(i,meal,rid,silent){
 const plan=S.week.plan;const old=plan[i].slots[meal];
 if(old&&!old.cont&&rid2r[old.rid]&&rid2r[old.rid].days===2&&plan[i+1]&&plan[i+1].slots[meal]&&plan[i+1].slots[meal].cont)
   delete plan[i+1].slots[meal];
 const r=rid2r[rid];
 plan[i].slots[meal]={rid};
 if(r.days===2&&i+1<S.week.days){
   if(!plan[i+1])plan[i+1]={slots:{}};
   if(!plan[i+1].slots[meal]||!S.week.locked[(i+1)+':'+meal])plan[i+1].slots[meal]={rid,cont:true};}
 for(let d=0;d<S.week.days;d++){for(const [m] of enabledMeals()){
   if(!plan[d].slots[m]){const usedToday=Object.values(plan[d].slots).map(s=>s.rid);
     const pool=poolFor(m,usedToday,null);
     if(pool.length)plan[d].slots[m]={rid:pool[Math.floor(Math.random()*pool.length)].id};}}}
 S.week.over={};S.week.checked={};if(!silent)save();}
function alternatives(meal,exceptRid,dayIdx){
 const usedToday=Object.values(S.week.plan[dayIdx].slots).map(s=>s.rid);
 return RECIPES.filter(r=>r.meal.includes(meal)&&allowed(r)&&r.id!==exceptRid&&!usedToday.includes(r.id)).slice(0,8);}

/* ---------- КОШИК ---------- */
function buildBasket(){
 const need={};const add=(id,q)=>{need[id]=(need[id]||0)+q;};
 S.week.plan.forEach(d=>{for(const meal in d.slots){const s=d.slots[meal];if(s.cont)continue;
   const r=rid2r[s.rid];if(!r)continue;const f=slotFactor(r);
   for(const ing of r.ing){const [id,q,o]=ing;if(o&&o.opt)continue;add(id,q*f);}}});
 for(const [id,def] of Object.entries(S.staples)){const n=+def||0;if(!n)continue;
   if(P().allerg.includes('dairy')&&ING[id][3]==='dairy')continue;
   const pk=(CAT&&CAT.map[id]&&CAT.map[id].packQty)||ING[id][4]||1;
   add(id,n*pk*Math.max(1,portions()/2.6));}
 const items=Object.entries(need).map(([id,q])=>{
   const [name,unit,,cat]=ING[id];const o=S.week.over[id]||{};
   const base=packUp(id,q);
   const info=o.q!=null?packUp(id,o.q-1e-9):base;
   const have=o.have!=null?o.have:S.pantry.includes(id);
   const prod=CAT&&CAT.map[id]?CAT.map[id]:null;
   return {id,name,unit,cat,qty:o.q!=null?o.q:base.qty,label:info.label,price:info.price,
     left:info.left,have,prod};});
 const order=Object.keys(CATS);
 items.sort((a,b)=>a.cat===b.cat?a.name.localeCompare(b.name,'uk'):order.indexOf(a.cat)-order.indexOf(b.cat));
 return items;}
const activeItems=()=>buildBasket().filter(i=>!i.have);
const total=()=>activeItems().reduce((s,i)=>s+i.price,0);
function dayStats(d){let k=0,b=0,zh=0,v=0,c=0;
 for(const meal in d.slots){const s=d.slots[meal];const r=rid2r[s.rid];if(!r)continue;
   if(!s.cont)c+=dishCost(r,slotFactor(r));
   k+=r.k;b+=r.b;zh+=r.zh;v+=r.v;}
 return {k,b,zh,v,c};}
function storeHome(){if(!CAT)return null;
 const first=Object.values(CAT.map)[0];
 try{return new URL(first.url).origin;}catch(_){return null;}}
/* магазини: STORES = {cities:[{key,name,stores:[{id,name,chain,address,delivery}]}]} */
const CITIES=(typeof STORES!=='undefined'&&STORES.cities)||[];
function cityObj(k){return CITIES.find(c=>c.key===k)||CITIES[0]||{key:k,name:k,stores:[]};}
function storesOf(k){return cityObj(k).stores||[];}
function curStore(){for(const c of CITIES){const s=(c.stores||[]).find(x=>x.id===S.storeId);if(s)return s;}
 return {id:S.storeId,name:(CAT&&CAT.store&&CAT.store.name)||'Магазин',chain:null,address:''};}
function listText(){
 const items=activeItems();
 let out=`🧺 Кошик тижня — ${S.week.days} дн., ${P().nm} (${P().a}+${P().k})\nРазом ≈ ${fmt(total())}${CAT?` · ціни ${CAT.store.name}`:''}\n`;
 let cat='';
 for(const i of items){if(i.cat!==cat){cat=i.cat;out+=`\n${CATS[cat]}\n`;}
   out+=`• ${i.name} — ${i.label} · ≈${fmt(i.price)}\n`;}
 return out;}

/* ---------- СВАЙПИ: картки страв + навігація між екранами ---------- */
let sw={mode:null,el:null,x0:0,y0:0,dx:0,dy:0};
document.addEventListener('touchstart',e=>{
 if($('#sheet').classList.contains('show'))return;
 const t=e.touches[0];
 const card=e.target.closest('.dc');
 if(S.onboarded&&S.view==='menu'&&card&&!card.classList.contains('cont'))
   sw={mode:'card',el:card,x0:t.clientX,y0:t.clientY,dx:0,dy:0};
 else if(!e.target.closest('input[type=range]'))
   sw={mode:'nav',el:null,x0:t.clientX,y0:t.clientY,dx:0,dy:0};
 else sw={mode:null};
},{passive:true});
document.addEventListener('touchmove',e=>{
 if(!sw.mode)return;
 const t=e.touches[0];
 sw.dx=t.clientX-sw.x0;sw.dy=t.clientY-sw.y0;
 if(sw.mode==='card'){
   if(Math.abs(sw.dy)>Math.abs(sw.dx)&&Math.abs(sw.dx)<12){sw.mode=null;sw.el.style.transform='';return;}
   sw.el.classList.add('drag');sw.el.style.transform=`translateX(${sw.dx}px)`;}
},{passive:true});
document.addEventListener('touchend',()=>{
 if(!sw.mode)return;
 const {mode,el,dx,dy}=sw;sw={mode:null};
 if(mode==='card'){
   el.classList.remove('drag');
   if(Math.abs(dx)>72){const i=+el.dataset.i,meal=el.dataset.meal;
     el.classList.add('out');el.style.transform=`translateX(${dx>0?420:-420}px)`;
     hap('medium');setTimeout(()=>UI.quickSwap(i,meal,el),180);}
   else el.style.transform='';
   return;}
 // навігація екранами
 if(Math.abs(dx)<64||Math.abs(dx)<Math.abs(dy)*1.4)return;
 if(!S.onboarded){if(dx>0&&S.wz>0){hap();S.wz--;S.navDir=-1;render();}return;}
 if(dx<0&&S.view==='menu')UI.go('basket');
 else if(dx>0&&S.view==='basket')UI.go('menu');
 else if(dx>0&&S.view==='dish')UI.back();
});

 meal(el,k){hap();const m=P().meals;m[k]=!m[k];
  if(!Object.values(m).some(Boolean)){m[k]=true;return;}
  el.classList.toggle('on');},
 allerg(el,k){hap();const a=P().allerg;a.includes(k)?a.splice(a.indexOf(k),1):a.push(k);el.classList.toggle('on');},
 days(v){S.week.days=+v;const el=document.getElementById('ob-days');if(el)el.textContent=v;},
 budget(v){P().budget=+v;const el=document.getElementById('ob-bud');if(el)el.textContent=fmt(+v);},
 kcalOn(el){hap();P().kcalOn=!P().kcalOn;el.classList.toggle('on');
  const w=document.getElementById('ob-kcal-wrap'),o=document.getElementById('ob-kcal-off');
  if(w)w.style.display=P().kcalOn?'':'none';if(o)o.style.display=P().kcalOn?'none':'';},
 kcal(v){P().kcal=+v;const el=document.getElementById('ob-kcal');if(el)el.textContent=v;},
 finish(){hap('ok');S.onboarded=true;save();
  if(S._reStore){S._reStore=false;S.view='basket';render();return;}
  S.view='menu';S.generating=true;render();
  setTimeout(()=>{generateWeek();S.generating=false;hap('ok');render();},750);},
 changeStore(){hap();S._reStore=true;S.onboarded=false;S.wz=1;S.view='menu';render();},
 checkout(){hap();openSheet(loginSheetHtml());
  setTimeout(()=>{const el=$('#lg-phone');if(el&&!el.value)el.focus();},60);},
 async doLogin(){
  const phone=($('#lg-phone').value||'').replace(/[^\d]/g,''),pass=$('#lg-pass').value||'';
  const msg=$('#lg-msg'),btn=$('#lg-btn');
  if(phone.length<10||!pass){msg.style.color='var(--mustard)';msg.textContent='Введи телефон (380…) і пароль';return;}
  S._phone=phone;btn.disabled=true;msg.style.color='var(--muted)';msg.textContent='Входжу в магазин…';
  let res;try{res=await zpost('/api/zakaz-login',{phone,password:pass,chain:curStore().chain||'tavriav'});}
  catch(_){res={ok:false,d:{errors:[{description:'Немає зв’язку із сервером. Запусти start.py.'}]}};}
  btn.disabled=false;
  if(res.ok&&res.d.sid){SID=res.d.sid;hap('ok');closeSheet();
   toast('Вхід виконано'+(res.d.user&&res.d.user.name?': '+res.d.user.name:''));}
  else{msg.style.color='var(--mustard)';msg.textContent=zErr(res.d);hap('error');}},

 go(v){hap();nav(v);},
 back(){hap();nav('menu');},
 regen(){hap();S.generating=true;render();
  setTimeout(()=>{generateWeek();S.generating=false;hap('ok');render();},650);},
 dish(i,meal){hap();nav('dish',{i,meal});},
 lock(i,meal){const key=i+':'+meal;
  S.week.locked[key]?delete S.week.locked[key]:S.week.locked[key]=true;
  save();hap();render();},
 swapSheet(i,meal){hap();openSheet(swapSheetHtml(i,meal));},
 pick(i,meal,rid){replaceSlot(i,meal,rid);delete S.week.locked[i+':'+meal];
  save();hap('ok');closeSheet();if(S.view==='dish')nav('menu');else render();toast('Замінено');},
 quickSwap(i,meal,el){
  const cur=S.week.plan[i].slots[meal].rid;
  const alts=alternatives(meal,cur,i);
  if(!alts.length){render();return;}
  const r=alts[Math.floor(Math.random()*alts.length)];
  replaceSlot(i,meal,r.id);delete S.week.locked[i+':'+meal];save();
  const row=el.closest('.slotrow');
  if(row){const tmp=document.createElement('div');tmp.innerHTML=slotCard(i,meal);
   row.replaceWith(tmp.firstElementChild);}
  const tot=document.getElementById('hdrtot');if(tot)tot.textContent=fmt(total());
  renderBar();hap('ok');},

 check(id,el){
  const wasAll=(()=>{const a=activeItems();return a.length&&a.every(x=>S.week.checked[x.id]);})();
  S.week.checked[id]=!S.week.checked[id];if(!S.week.checked[id])delete S.week.checked[id];
  save();hap('light');
  el.classList.toggle('done');const ck=el.querySelector('.ck');if(ck)ck.textContent=S.week.checked[id]?'✓':'';
  const act=activeItems();const done=act.filter(x=>S.week.checked[x.id]).length;
  const t=document.getElementById('progtxt');if(t)t.textContent=`${done} із ${act.length}`;
  const b=document.getElementById('progbar');if(b)b.style.width=(act.length?Math.round(done/act.length*100):0)+'%';
  const isAll=act.length&&done===act.length;
  if(isAll!==wasAll){if(isAll)hap('ok');rerenderKeepScroll();}},
 q(id,d){const it=buildBasket().find(x=>x.id===id);if(!it)return;
  const pk=(CAT&&CAT.map[id]&&!CAT.map[id].loose&&CAT.map[id].packQty)||ING[id][4];
  const st=pk?pk:(['кг','л'].includes(it.unit)?.1:1);
  const nq=Math.max(0,+(it.qty+d*st).toFixed(2));
  if(nq===0)S.week.over[id]={...(S.week.over[id]||{}),have:true};
  else S.week.over[id]={...(S.week.over[id]||{}),q:nq};
  save();hap();rerenderKeepScroll();},
 have(id){const it=buildBasket().find(x=>x.id===id);
  S.week.over[id]={...(S.week.over[id]||{}),have:!it.have};
  save();hap();rerenderKeepScroll();},
 toggleHome(){S.week.homeOpen=!S.week.homeOpen;rerenderKeepScroll();},
 openStore(){hap();const h=storeHome();if(h)openLink(h);},
 find(id){hap();const c=CAT&&CAT.map[id];
  openLink(c&&c.url?c.url:'https://zakaz.ua/uk/search/?q='+encodeURIComponent(ING[id][0]));},

 copy(){copyList();},
 send(){sendToChat();},
 settings(){hap();openSheet(settingsSheetHtml());},
 closeSheet(){closeSheet();},
 dislikesSheet(){hap();openSheet(dislikesSheetHtml());},
 dislike(el,k){hap();const a=S.week.dislikes;a.includes(k)?a.splice(a.indexOf(k),1):a.push(k);el.classList.toggle('on');},
 applyDislikes(){closeSheet();UI.regen();},
 filtersSheet(){hap();openSheet(filtersSheetHtml());},
 fdays(v){S.week.days=+v;const el=document.getElementById('f-days');if(el)el.textContent=v;},
 fbud(v){P().budget=+v;const el=document.getElementById('f-bud');if(el)el.textContent=fmt(+v);},
 fkcalOn(el){hap();P().kcalOn=!P().kcalOn;el.classList.toggle('on');
  const w=document.getElementById('f-kcal-wrap');if(w)w.style.display=P().kcalOn?'':'none';},
 fkcal(v){P().kcal=+v;const el=document.getElementById('f-kcal');if(el)el.textContent=v;},
 applyFilters(){closeSheet();UI.regen();},
 staplesSheet(){hap();openSheet(staplesSheetHtml());},
 stq(id,d){hap();S.staples[id]=Math.max(0,Math.min(9,(+S.staples[id]||0)+d));save();
  const n=+S.staples[id];
  const v=document.getElementById('st-'+id);if(v)v.textContent=n;
  const q=document.getElementById('stq-'+id);
  if(q){if(!n)q.textContent='вимкнено';
   else{const pk=(CAT&&CAT.map[id]&&CAT.map[id].packQty)||ING[id][4]||1;
     const p=packUp(id,n*pk*Math.max(1,portions()/2.6));
     q.textContent=`≈ ${p.label} · ${fmt(p.price)}`;}}},
 applySheet(){save();closeSheet();render();},

 switchProfile(i){hap('medium');S.pid=i;save();closeSheet();UI.regen();toast('Профіль: '+P().nm);},
 addProfile(){hap();const cp=JSON.parse(JSON.stringify(P()));cp.nm='Профіль '+(S.profiles.length+1);
  S.profiles.push(cp);S.pid=S.profiles.length-1;save();openSheet(settingsSheetHtml());},
 delProfile(){if(S.profiles.length<2)return;S.profiles.splice(S.pid,1);S.pid=0;
  save();closeSheet();UI.regen();},
 pname(v){P().nm=v||'Профіль';save();},
 spp(k,d){hap();P()[k]=Math.max(k==='a'?1:0,Math.min(8,P()[k]+d));
  const el=document.getElementById('s-'+k);if(el)el.textContent=P()[k];},
 smeal(el,k){hap();const m=P().meals;m[k]=!m[k];
  if(!Object.values(m).some(Boolean)){m[k]=true;return;}
  el.classList.toggle('on');},
 sallerg(el,k){hap();const a=P().allerg;a.includes(k)?a.splice(a.indexOf(k),1):a.push(k);el.classList.toggle('on');},
 saveSettings(){save();closeSheet();UI.regen();toast('Збережено');}
};

 syncCat();
 // чи доступний бекенд замовлення (проксі /api)? На GitHub Pages його немає —

 try{const h=await fetch('/api/health',{cache:'no-store'});ORDER_READY=h.ok;}catch(_){ORDER_READY=false;}
 if(S.onboarded&&!S.week.plan.length)generateWeek();
